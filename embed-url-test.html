<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed URL 测试页面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin-bottom: 20px; color: #333; }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover { background: #2563eb; }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f9fafb;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    .error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #dc2626;
    }
    .success {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #16a34a;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-top: 20px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Embed URL 测试工具</h1>
    
    <div class="form-group">
      <label>API 地址:</label>
      <input type="text" id="apiUrl" value="http://123.57.182.243:3100/api/review/embed-url">
    </div>
    
    <div class="form-group">
      <label>项目 ID (project_id):</label>
      <input type="text" id="projectId" value="AvevaMarineSample">
    </div>
    
    <div class="form-group">
      <label>用户 ID (user_id):</label>
      <input type="text" id="userId" value="SJ">
    </div>
    
    <div class="form-group">
      <label>Token (可选):</label>
      <input type="text" id="token" placeholder="留空则不传递">
    </div>
    
    <button id="getUrlBtn" onclick="getEmbedUrl()">获取嵌入地址</button>
    <button id="openBtn" onclick="openInIframe()" disabled style="margin-left: 10px;">在下方加载</button>
    <button id="openNewBtn" onclick="openInNewTab()" disabled style="margin-left: 10px;">新标签页打开</button>
    
    <div id="result"></div>
    <div id="iframeContainer"></div>
  </div>

  <script>
    let embedUrl = '';

    async function getEmbedUrl() {
      const apiUrl = document.getElementById('apiUrl').value;
      const projectId = document.getElementById('projectId').value;
      const userId = document.getElementById('userId').value;
      const token = document.getElementById('token').value;
      
      const resultDiv = document.getElementById('result');
      const getBtn = document.getElementById('getUrlBtn');
      const openBtn = document.getElementById('openBtn');
      const openNewBtn = document.getElementById('openNewBtn');
      
      getBtn.disabled = true;
      openBtn.disabled = true;
      openNewBtn.disabled = true;
      resultDiv.innerHTML = '<div class="loading">⏳ 正在请求...</div>';
      
      try {
        const body = {
          project_id: projectId,
          user_id: userId,
          extra_params: {}
        };
        
        if (token) {
          body.token = token;
        }
        
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log('API 响应:', data);
        
        // 解析响应
        if (data.url) {
          embedUrl = data.url;
        } else if (data.data) {
          const relativePath = data.data.relative_path || data.data.relativePath || '';
          const tokenValue = data.data.token || '';
          const query = data.data.query || {};
          const formId = query.form_id || query.formId || '';
          
          const baseUrl = window.location.origin;
          const params = new URLSearchParams();
          if (tokenValue) params.set('user_token', tokenValue);
          if (formId) params.set('form_id', formId);
          params.set('user_id', userId);
          params.set('project_id', projectId);
          params.set('output_project', projectId);
          
          embedUrl = `${baseUrl}${relativePath}?${params.toString()}`;
        } else {
          throw new Error('响应格式不正确');
        }
        
        resultDiv.innerHTML = `
          <div class="result success">
            <strong>✅ 成功获取嵌入地址:</strong><br>
            <code style="word-break: break-all;">${embedUrl}</code>
          </div>
        `;
        
        openBtn.disabled = false;
        openNewBtn.disabled = false;
        
      } catch (error) {
        console.error('请求失败:', error);
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ 请求失败:</strong><br>
            ${error.message}
          </div>
        `;
      } finally {
        getBtn.disabled = false;
      }
    }
    
    function openInIframe() {
      const container = document.getElementById('iframeContainer');
      container.innerHTML = `<iframe src="${embedUrl}" frameborder="0"></iframe>`;
    }
    
    function openInNewTab() {
      window.open(embedUrl, '_blank');
    }
  </script>
</body>
</html>

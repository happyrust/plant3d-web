<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型中心 (洲影) 演示系统 v1.1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .input-group label { display: block; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.375rem; }
        .input-field { width: 100%; background-color: #0f172a; border: 1px solid #334155; color: #f1f5f9; border-radius: 0.5rem; padding: 0.625rem 0.875rem; font-size: 0.875rem; transition: border-color 0.2s; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
        .btn { padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.875rem; transition: all 0.2s; display: inline-flex; items-center; gap: 0.5rem; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4); }
        .btn-secondary { background-color: #334155; color: #e2e8f0; border: 1px solid #475569; }
        .btn-secondary:hover { background-color: #475569; }
        .status-badge { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.75rem; padding: 0.25rem 0.625rem; rounded-full; }
        iframe { border-radius: 0.75rem; border: 1px solid #334155; background: #000; }
        .debug-area { background-color: #020617; border-radius: 0.5rem; padding: 1rem; border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-6 md:p-10">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white mb-1">模型中心演示系统 <span class="text-blue-500">洲影</span></h1>
                <p class="text-slate-400 text-sm italic">遵循《编校审交互接口设计文档》标准实现</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="status-badge bg-blue-500/10 text-blue-400 border border-blue-500/20">Version 1.1.3</span>
                <span class="status-badge bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Online</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Config Column -->
            <div class="lg:col-span-1 space-y-6">
                <div class="card p-6 space-y-5">
                    <h2 class="text-lg font-semibold flex items-center gap-2 border-b border-slate-700 pb-3">
                        <span class="mdi mdi-cog-outline text-blue-500"></span> 接口参数配置
                    </h2>
                    
                    <div class="input-group">
                        <label>项目编号 (project_id)</label>
                        <input type="text" id="project_id" value="1516" class="input-field">
                    </div>
                    
                    <div class="input-group">
                        <label>用户账号 (user_id)</label>
                        <input type="text" id="user_id" value="guest" class="input-field">
                    </div>

                    <div class="input-group">
                        <label>接口地址 (8080 API)</label>
                        <input type="text" id="api_url" value="http://182.92.114.178:8080/api" class="input-field">
                    </div>

                    <div class="input-group">
                        <label>前端地址 (Port 80 Root)</label>
                        <input type="text" id="web_url" value="http://182.92.114.178" class="input-field">
                    </div>
                    
                    <div class="pt-2 space-y-3">
                        <button onclick="preloadCache()" class="btn btn-secondary w-full">
                            <span class="mdi mdi-cached"></span> 1. 触发缓存预加载
                        </button>
                        <button onclick="loadEmbed()" class="btn btn-primary w-full">
                            <span class="mdi mdi-play-circle-outline"></span> 2. 获取地址并加载
                        </button>
                    </div>
                </div>

                <!-- Info Area -->
                <div class="card p-5 bg-slate-900/30 border-blue-900/20">
                    <h3 class="text-sm font-bold text-slate-300 mb-3 flex items-center gap-2">
                        <span class="mdi mdi-information-outline text-amber-500"></span> 拼接规则说明
                    </h3>
                    <p class="text-xs text-slate-400 leading-relaxed">
                        根据文档，系统将向后台 8080 端口请求 Token 和 相对路径，然后将其与前端 80 端口根地址组合成最终的长链接。
                    </p>
                </div>
            </div>

            <!-- Preview Column -->
            <div class="lg:col-span-2 space-y-6">
                <!-- URL Debug View -->
                <div class="debug-area">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold font-mono">生成的完整拼接 URL</span>
                        <span id="status-text" class="text-[10px] text-blue-400 font-mono italic">等待操作...</span>
                    </div>
                    <div id="debug-url" class="text-xs font-mono text-blue-300 break-all leading-relaxed h-12 overflow-y-auto">
                        点击按钮后显示生成的拼接地址...
                    </div>
                </div>

                <!-- Iframe View -->
                <div class="relative group">
                    <div class="absolute -top-3 left-4 px-2 bg-[#0f172a] text-[10px] text-slate-500 font-mono z-10 border border-slate-700 rounded transition-opacity group-hover:text-blue-400">
                        IFRAME VIEWPORT (3D)
                    </div>
                    <div class="w-full h-[600px] card overflow-hidden">
                        <iframe id="preview-frame" class="w-full h-full" src="about:blank"></iframe>
                    </div>
                    <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden">
                        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                        <p class="mt-4 text-sm font-medium text-blue-400 animate-pulse">正在根据文档注入参数...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateStatus(text, isError = false) {
            const el = document.getElementById('status-text');
            el.innerText = text;
            el.className = `text-[10px] font-mono italic ${isError ? 'text-red-400' : 'text-blue-400'}`;
        }

        async function preloadCache() {
            const api = document.getElementById('api_url').value;
            const project = document.getElementById('project_id').value;
            const user = document.getElementById('user_id').value;
            
            updateStatus('正在触发 8080 API 预加载...');
            try {
                const res = await fetch(`${api}/review/preload-cache`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_id: project, initiator: user })
                });
                const data = await res.json();
                if (data.success || data.code === 0) {
                    alert('预加载已受理 (Task ID: ' + (data.task_id || 'ok') + ')');
                    updateStatus('预加载受理成功');
                } else {
                    alert('预加载失败: ' + (data.message || '未知错误'));
                    updateStatus('预加载失败', true);
                }
            } catch (e) {
                alert('网络错误: ' + e.message);
                updateStatus('连接 API 失败', true);
            }
        }

        async function loadEmbed() {
            const api = document.getElementById('api_url').value;
            const web = document.getElementById('web_url').value;
            const project = document.getElementById('project_id').value;
            const user = document.getElementById('user_id').value;
            const frame = document.getElementById('preview-frame');
            const debug = document.getElementById('debug-url');
            const spinner = document.getElementById('loading-spinner');

            spinner.classList.remove('hidden');
            updateStatus('正在请求 API 获取嵌入凭证...');

            try {
                const res = await fetch(`${api}/review/embed-url`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_id: project, user_id: user })
                });
                const response = await res.json();

                if (response.code === 0 && response.data) {
                    const { relative_path, token, query } = response.data;
                    const form_id = query ? query.form_id : '';

                    // 遵循文档的拼装逻辑:
                    // BASE_URL + relative_path + ?user_token=xxx&form_id=xxx&user_id=xxx&project_id=xxx
                    const baseUrl = web.endsWith('/') ? web.slice(0, -1) : web;
                    const cleanPath = relative_path.startsWith('/') ? relative_path : '/' + relative_path;
                    
                    const fullUrl = `${baseUrl}${cleanPath}?user_token=${token}&form_id=${form_id}&user_id=${user}&project_id=${project}`;
                    
                    debug.innerText = fullUrl;
                    updateStatus('拼接正常，正在加载 3D 审阅界面...');
                    
                    frame.src = fullUrl;
                    frame.onload = () => {
                        spinner.classList.add('hidden');
                        updateStatus('页面加载完成');
                    };
                } else {
                    updateStatus('API 返回数据无效', true);
                    spinner.classList.add('hidden');
                }
            } catch (e) {
                updateStatus('API 请求出错: ' + e.message, true);
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

name: Release and Deploy

on:
  push:
    tags: ['v*.*.*']

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build Frontend Release
    runs-on: ubuntu-latest
    env:
      FRONTEND_ENV_PRODUCTION: ${{ secrets.FRONTEND_ENV_PRODUCTION }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Install dependencies
        run: npm ci

      - name: Write production env
        if: ${{ env.FRONTEND_ENV_PRODUCTION != '' }}
        run: |
          cat > .env.production <<'EOF'
          ${{ env.FRONTEND_ENV_PRODUCTION }}
          EOF
      
      - name: Create version metadata
        run: |
          mkdir -p public
          cat > public/version.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "commit": "${{ github.sha }}",
            "buildDate": "$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          }
          EOF
      
      - name: Build
        run: npm run build
      
      - name: Package release
        run: |
          cd dist
          tar -czf ../plant3d-web-${{ steps.version.outputs.VERSION }}.tar.gz .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release
          path: plant3d-web-*.tar.gz
          retention-days: 30

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-release
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail

          test -n "$SSH_PRIVATE_KEY"
          test -n "$PROD_HOST"
          test -n "$PROD_USER"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts
          
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE="plant3d-web-$VERSION.tar.gz"
          EXTRACT_DIR="$RUNNER_TEMP/plant3d-web-$VERSION"

          test -f "$ARCHIVE"
          mkdir -p "$EXTRACT_DIR"
          tar -xzf "$ARCHIVE" -C "$EXTRACT_DIR"
          
          ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST 'bash -se' << ENDSSH
            set -euo pipefail

            DEPLOY_DIR="/var/www/plant3d-web"

            sudo mkdir -p "\$DEPLOY_DIR"
            sudo journalctl --vacuum-size=100M || true
            sudo apt-get clean || true
            sudo rm -rf /var/cache/apt/archives/*.deb /var/cache/apt/archives/partial/* || true
            sudo find /var/log -type f -name '*.gz' -delete || true
            sudo find /var/log -type f -regex '.*\\.[0-9]+' -delete || true
            rm -rf "\$HOME"/.cache/* || true
            echo 'Top directories under /:'
            sudo du -xhd1 / 2>/dev/null | sort -h | tail -n 20 || true
            echo 'Top directories under /var:'
            sudo du -xhd1 /var 2>/dev/null | sort -h | tail -n 20 || true
            sudo du -sh "\$DEPLOY_DIR" || true
            df -h "\$DEPLOY_DIR" || true
            sudo find "\$DEPLOY_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            df -h "\$DEPLOY_DIR" || true
          ENDSSH

          rsync -az --inplace \
            -e "ssh -i ~/.ssh/deploy_key" \
            --rsync-path="sudo rsync" \
            "$EXTRACT_DIR"/ "$PROD_USER@$PROD_HOST:/var/www/plant3d-web/"

          ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST 'bash -se' << ENDSSH
            set -euo pipefail

            DEPLOY_DIR="/var/www/plant3d-web"

            sudo chown -R www-data:www-data "\$DEPLOY_DIR" 2>/dev/null || true
            sudo nginx -t
            sudo systemctl reload nginx
            echo "Deployed frontend to \$DEPLOY_DIR"
          ENDSSH

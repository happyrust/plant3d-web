name: Release and Deploy

on:
  push:
    tags: ['v*.*.*']

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build Frontend Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Install dependencies
        run: npm ci

      - name: Write production env
        if: ${{ secrets.FRONTEND_ENV_PRODUCTION != '' }}
        run: |
          cat > .env.production <<'EOF'
          ${{ secrets.FRONTEND_ENV_PRODUCTION }}
          EOF
      
      - name: Create version metadata
        run: |
          mkdir -p public
          cat > public/version.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "commit": "${{ github.sha }}",
            "buildDate": "$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          }
          EOF
      
      - name: Build
        run: npm run build
      
      - name: Package release
        run: |
          cd dist
          tar -czf ../plant3d-web-${{ steps.version.outputs.VERSION }}.tar.gz .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release
          path: plant3d-web-*.tar.gz
          retention-days: 30

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-release
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail

          test -n "$SSH_PRIVATE_KEY"
          test -n "$PROD_HOST"
          test -n "$PROD_USER"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts
          
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE="plant3d-web-$VERSION.tar.gz"

          test -f "$ARCHIVE"

          scp -i ~/.ssh/deploy_key "$ARCHIVE" $PROD_USER@$PROD_HOST:/tmp/
          
          ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST 'bash -se' << ENDSSH
            set -euo pipefail

            VERSION="${{ steps.version.outputs.VERSION }}"
            APP_ROOT="/opt/plant3d-web"
            RELEASE_DIR="\$APP_ROOT/releases/\$VERSION"
            CURRENT_LINK="/opt/plant3d-web/current"

            mkdir -p "\$APP_ROOT/releases"

            PREV_RELEASE=""
            if [ -L "\$CURRENT_LINK" ]; then
              PREV_RELEASE=\$(readlink -f "\$CURRENT_LINK")
              echo "Previous release: \$PREV_RELEASE"
            fi

            rm -rf "\$RELEASE_DIR"
            mkdir -p "\$RELEASE_DIR"
            tar -xzf "/tmp/plant3d-web-\$VERSION.tar.gz" -C "\$RELEASE_DIR"
            rm -f "/tmp/plant3d-web-\$VERSION.tar.gz"

            test -f "\$RELEASE_DIR/index.html"

            ln -sfn "\$RELEASE_DIR" "\$CURRENT_LINK"

            if ! sudo nginx -t; then
              if [ -n "\$PREV_RELEASE" ]; then
                ln -sfn "\$PREV_RELEASE" "\$CURRENT_LINK"
              fi
              exit 1
            fi

            if ! sudo systemctl reload nginx; then
              if [ -n "\$PREV_RELEASE" ]; then
                ln -sfn "\$PREV_RELEASE" "\$CURRENT_LINK"
              fi
              exit 1
            fi

            echo "Deployed frontend version \$VERSION to production"
          ENDSSH

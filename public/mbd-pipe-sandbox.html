<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MBD 管道尺寸标注沙盒</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0b1020; color: #e5e7eb; font-family: ui-sans-serif, system-ui; }
      #wrap { display: grid; grid-template-rows: auto 1fr; height: 100%; }
      #bar { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; opacity: 0.9; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
      #bar code { color: #a7f3d0; }
      .legend { display: flex; gap: 12px; flex-wrap: wrap; }
      .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
      .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
      #canvas { width: 100%; height: 100%; display: block; }
      #status { position: fixed; bottom: 12px; left: 12px; font-size: 11px; color: #94a3b8; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="bar">
        <span>MBD 管道尺寸标注沙盒（SolveSpace 风格）</span>
        <div class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> segment</span>
          <span class="legend-item"><span class="legend-dot" style="background:#eab308"></span> chain</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ffffff"></span> overall</span>
          <span class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> port</span>
          <span class="legend-item"><span class="legend-dot" style="background:#f97316"></span> weld</span>
          <span class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span> slope</span>
        </div>
      </div>
      <canvas id="canvas"></canvas>
    </div>
    <div id="status">加载中…</div>
    <script type="module" src="/src/debug/mbdPipeSandbox.ts"></script>
  </body>
</html>

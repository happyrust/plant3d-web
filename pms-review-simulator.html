<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMS 三维校审调试模拟器</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f2f5f9;
        color: #1f2937;
      }

      #app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 220px 1fr;
      }

      .sidebar {
        background: #0f2742;
        color: #dbe7f3;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #0a1a2d;
      }

      .brand {
        padding: 16px 18px;
        border-bottom: 1px solid rgba(219, 231, 243, 0.16);
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .menu-group {
        padding: 14px 10px;
      }

      .menu-title {
        color: #8ba4be;
        font-size: 12px;
        margin: 0 10px 6px;
      }

      .menu-item {
        border-radius: 4px;
        padding: 8px 10px;
        font-size: 14px;
        margin: 2px 0;
        user-select: none;
      }

      .menu-item.active {
        color: #fff;
        background: rgba(59, 130, 246, 0.32);
        border: 1px solid rgba(96, 165, 250, 0.6);
      }

      .main {
        min-width: 0;
        display: grid;
        grid-template-rows: auto auto 1fr;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #d9e1ea;
        background: #ffffff;
      }

      .breadcrumbs {
        font-size: 13px;
        color: #64748b;
      }

      .header-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
      }

      .roles {
        padding: 10px 16px;
        border-bottom: 1px solid #d9e1ea;
        background: #f8fbff;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .role-buttons {
        display: inline-flex;
        gap: 8px;
      }

      .role-btn {
        border: 1px solid #c9d5e6;
        border-radius: 4px;
        background: #fff;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .role-btn.active {
        border-color: #2563eb;
        background: #dbeafe;
        color: #1d4ed8;
        font-weight: 600;
      }

      .role-btn:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(240px, 1fr) minmax(260px, 38%);
        gap: 10px;
        padding: 10px 14px 14px;
      }

      .toolbar {
        background: #fff;
        border: 1px solid #d9e1ea;
        border-radius: 4px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .toolbar-actions {
        display: inline-flex;
        gap: 8px;
      }

      .tool-btn {
        border: 1px solid #cad8e8;
        background: linear-gradient(#fff, #f8fafc);
        color: #334155;
        border-radius: 4px;
        padding: 6px 14px;
        font-size: 12px;
        cursor: pointer;
      }

      .tool-btn:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .toolbar-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }

      .toolbar-meta input {
        width: 180px;
        border: 1px solid #cad8e8;
        border-radius: 4px;
        padding: 5px 8px;
      }

      .table-panel,
      .bottom-panel {
        min-height: 0;
        background: #fff;
        border: 1px solid #d9e1ea;
        border-radius: 4px;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .panel-title {
        border-bottom: 1px solid #e2e8f0;
        padding: 8px 10px;
        font-size: 12px;
        color: #475569;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .table-wrap {
        min-height: 0;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead tr {
        background: #eff3f8;
      }

      th,
      td {
        border-bottom: 1px solid #e6edf5;
        border-right: 1px solid #eef3f8;
        text-align: left;
        padding: 7px 8px;
        white-space: nowrap;
        vertical-align: middle;
      }

      th:last-child,
      td:last-child {
        border-right: none;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr:hover {
        background: #f4f8ff;
      }

      tbody tr.selected {
        background: #dbeafe;
      }

      .status-badge {
        display: inline-flex;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        line-height: 1.4;
        border: 1px solid transparent;
      }

      .status-draft {
        background: #f1f5f9;
        border-color: #cbd5e1;
        color: #475569;
      }

      .status-submitted {
        background: #fef9c3;
        border-color: #facc15;
        color: #854d0e;
      }

      .status-in_review {
        background: #dbeafe;
        border-color: #93c5fd;
        color: #1d4ed8;
      }

      .status-approved {
        background: #dcfce7;
        border-color: #86efac;
        color: #166534;
      }

      .status-rejected {
        background: #fee2e2;
        border-color: #fca5a5;
        color: #b91c1c;
      }

      .status-cancelled {
        background: #f1f5f9;
        border-color: #cbd5e1;
        color: #64748b;
      }

      .empty,
      .error,
      .loading {
        padding: 16px;
        font-size: 12px;
      }

      .error {
        color: #b91c1c;
        background: #fef2f2;
      }

      .bottom-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(380px, 1fr) minmax(320px, 36%);
      }

      .iframe-box,
      .diag-box {
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .iframe-box {
        border-right: 1px solid #e2e8f0;
      }

      .iframe-head,
      .diag-head {
        padding: 8px 10px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
      }

      .iframe-actions,
      .diag-actions {
        display: inline-flex;
        gap: 6px;
      }

      .mini-btn {
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        background: #fff;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }

      .mini-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal.show {
        display: flex;
      }

      .modal-content {
        background: white;
        border-radius: 8px;
        width: 90vw;
        height: 85vh;
        max-width: 1400px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      .modal-header {
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f9fafb;
        border-radius: 8px 8px 0 0;
      }

      .modal-title {
        font-weight: 600;
        color: #111827;
      }

      .modal-actions {
        display: flex;
        gap: 8px;
      }

      .modal-body {
        flex: 1;
        padding: 0;
        overflow: hidden;
      }

      .modal-body iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .modal-close {
        background: #ef4444;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }

      .modal-close:hover {
        background: #dc2626;
      }

      .modal-reopen {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }

      .modal-reopen:hover {
        background: #2563eb;
      }

      .modal-reopen:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .diag-content {
        min-height: 0;
        overflow: auto;
        padding: 10px;
        font-size: 12px;
        line-height: 1.6;
      }

      .workflow-sync-controls {
        border-bottom: 1px solid #e2e8f0;
        padding: 10px;
        background: #f8fafc;
        display: grid;
        gap: 8px;
      }

      .workflow-sync-controls label {
        display: block;
        font-size: 12px;
        color: #334155;
        font-weight: 600;
      }

      .workflow-sync-comment {
        width: 100%;
        min-height: 64px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        resize: vertical;
        box-sizing: border-box;
        font-family: inherit;
      }

      .workflow-sync-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .workflow-sync-btn {
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        background: #fff;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .workflow-sync-btn.primary {
        background: #eff6ff;
        border-color: #93c5fd;
        color: #1d4ed8;
      }

      .workflow-sync-btn.success {
        background: #ecfdf5;
        border-color: #86efac;
        color: #166534;
      }

      .workflow-sync-btn.warn {
        background: #fff7ed;
        border-color: #fdba74;
        color: #9a3412;
      }

      .workflow-sync-btn.danger {
        background: #fef2f2;
        border-color: #fca5a5;
        color: #b91c1c;
      }

      .workflow-sync-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .workflow-sync-hint {
        font-size: 12px;
        color: #64748b;
      }

      .workflow-sync-hint.ok {
        color: #166534;
      }

      .workflow-sync-hint.fail {
        color: #b91c1c;
      }

      .diag-card {
        border: 1px solid #dbe3ef;
        border-radius: 4px;
        background: #f8fbff;
        padding: 8px;
        margin-bottom: 8px;
      }

      .diag-grid {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 4px 8px;
      }

      .diag-key {
        color: #64748b;
      }

      .diag-value {
        color: #111827;
        font-weight: 500;
        word-break: break-all;
      }

      .diag-list {
        margin: 6px 0 0;
        padding-left: 18px;
      }

      .diag-list li {
        margin-bottom: 2px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">PowerPMS · 调试模拟器</div>
        <div class="menu-group">
          <div class="menu-title">设计交付</div>
          <div class="menu-item active">三维校审单</div>
        </div>
        <div class="menu-group">
          <div class="menu-title">系统管理</div>
          <div class="menu-item">平台管理</div>
        </div>
      </aside>

      <main class="main">
        <section class="topbar">
          <div class="breadcrumbs">当前位置：设计交付 / 三维校审单（PMS 调试模式）</div>
          <div class="header-meta">
            <span id="current-user-label">当前用户：SJ</span>
            <span id="current-role-label">当前角色：编制</span>
          </div>
        </section>

        <section class="roles">
          <span>快速角色切换：</span>
          <div id="role-buttons" class="role-buttons">
            <button class="role-btn active" data-role="SJ">SJ</button>
            <button class="role-btn" data-role="JH">JH</button>
            <button class="role-btn" data-role="SH">SH</button>
            <button class="role-btn" data-role="PZ">PZ</button>
          </div>
          <button id="reopen-last-btn" class="mini-btn" disabled>重开最近 form_id</button>
          <span id="last-form-label">最近打开：--</span>
        </section>

        <section class="workspace">
          <div class="toolbar">
            <div class="toolbar-actions">
              <button id="tool-create" class="tool-btn">新增</button>
              <button id="tool-delete" class="tool-btn" disabled>删除</button>
              <button id="tool-edit" class="tool-btn" disabled>编辑</button>
              <button id="tool-view" class="tool-btn" disabled>查看</button>
              <button id="tool-reopen" class="tool-btn" disabled>重开当前</button>
              <button id="tool-refresh" class="tool-btn">刷新</button>
            </div>
            <div class="toolbar-meta">
              <label for="project-id-input">项目号</label>
              <input id="project-id-input" type="text" />
            </div>
          </div>

          <section class="table-panel">
            <div class="panel-title">
              <span>三维校审单（真实任务列表）</span>
              <span id="table-summary">--</span>
            </div>
            <div id="table-wrap" class="table-wrap"></div>
          </section>

          <section class="bottom-panel">
            <div class="panel-title">调试工作区（诊断）</div>
            <section class="diag-box">
              <div class="diag-head">
                <span>form_id 诊断区</span>
                <div class="diag-actions">
                  <button id="diag-task-btn" class="mini-btn" disabled>查任务详情</button>
                  <button id="diag-workflow-btn" class="mini-btn" disabled>查 form_id 聚合</button>
                </div>
              </div>
              <div class="workflow-sync-controls">
                <label for="workflow-comment-input">workflow/sync comments（可选）</label>
                <textarea
                  id="workflow-comment-input"
                  class="workflow-sync-comment"
                  placeholder="例如：校核同意，进入下一环节"></textarea>
                <div class="workflow-sync-buttons">
                  <button id="workflow-action-active-btn" class="workflow-sync-btn primary" disabled>active 发起</button>
                  <button id="workflow-action-agree-btn" class="workflow-sync-btn success" disabled>agree 同意</button>
                  <button id="workflow-action-return-btn" class="workflow-sync-btn warn" disabled>return 驳回</button>
                  <button id="workflow-action-stop-btn" class="workflow-sync-btn danger" disabled>stop 终止</button>
                </div>
                <div id="workflow-action-hint" class="workflow-sync-hint">请选择带 form_id 的记录后再执行流程动作。</div>
              </div>
              <div id="diag-content" class="diag-content"></div>
            </section>
          </section>

          <!-- 弹窗模式的 iframe -->
          <div id="iframe-modal" class="modal">
            <div class="modal-content">
              <div class="modal-header">
                <div id="modal-title" class="modal-title">未打开校审页面</div>
                <div class="modal-actions">
                  <button id="modal-reopen-btn" class="modal-reopen" disabled>刷新重开</button>
                  <button id="modal-close-btn" class="modal-close">关闭</button>
                </div>
              </div>
              <div class="modal-body">
                <iframe id="review-iframe" title="PMS 三维校审 iframe" src="about:blank"></iframe>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/debug/pmsReviewSimulator.ts"></script>
  </body>
</html>

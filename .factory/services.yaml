commands:
  install_frontend: npm install
  install_backend: cd D:\work\plant-code\plant-model-gen && cargo check --bin web_server --features web_server
  typecheck: npm run type-check
  build: npm run build
  test: npm test -- --run --reporter=verbose --maxWorkers=8
  lint: npm run lint
  test_backend: cd D:\work\plant-code\plant-model-gen && cargo check --bin web_server --features web_server

services:
  surrealdb:
    start: echo "SurrealDB managed externally on port 8020"
    stop: echo "SurrealDB managed externally"
    healthcheck: curl -sf http://localhost:8020/health
    port: 8020
    depends_on: []

  backend:
    start: cd D:\work\plant-code\plant-model-gen && cargo run --bin web_server --features web_server --release
    stop: cmd /c "for /f \"tokens=5\" %a in ('netstat -aon ^| findstr :3100 ^| findstr LISTENING') do taskkill /f /pid %a"
    healthcheck: curl -sf http://localhost:3100/api/review/tasks
    port: 3100
    depends_on: [surrealdb]

  frontend:
    start: cd D:\work\plant-code\plant3d-web && npm run dev
    stop: cmd /c "for /f \"tokens=5\" %a in ('netstat -aon ^| findstr :3101 ^| findstr LISTENING') do taskkill /f /pid %a"
    healthcheck: curl -sf http://localhost:3101
    port: 3101
    depends_on: [backend]

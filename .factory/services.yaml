commands:
  install: npm install
  typecheck: npm run type-check
  lint: npx eslint src/api/mbdPipeApi.ts src/composables/useMbdPipeAnnotationThree.ts src/composables/mbd --ext .ts --max-warnings 0
  test: npx vitest run src/composables/useMbdPipeAnnotationThree.flyTo.test.ts src/fixtures/bran-test-data.test.ts
  test:layout-regression: npx vitest run src/composables/useMbdPipeAnnotationThree.flyTo.test.ts src/fixtures/bran-test-data.test.ts
  test:layout-focused: npx vitest run src/composables/useMbdPipeAnnotationThree.flyTo.test.ts src/fixtures/bran-test-data.test.ts

services:
  frontend:
    start: npm run dev -- --host 127.0.0.1 --port 3101
    stop: lsof -ti :3101 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:3101
    port: 3101
    depends_on: []

  backend:
    start: echo "Backend is optional for this frontend-first mission"
    stop: echo "No backend lifecycle owned by this mission"
    healthcheck: true
    port: 3100
    depends_on: []

# Mission-scoped validation commands are `commands.typecheck`, `commands.lint`, and `commands.test:layout-regression`.
# Prefer adding focused Vitest files for new pure layout modules rather than widening to whole-repo test runs.
# Whole-repo `npm run lint` and `npm test` are not the mission gate because unrelated baseline issues may exist outside the MBD layout surface.

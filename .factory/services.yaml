commands:
  install: npm install
  typecheck: npm run type-check
  test: npx vitest run src/components/review/ConfirmedRecords.test.ts src/components/review/DesignerTaskList.test.ts src/components/review/ResubmissionTaskList.test.ts src/components/review/WorkflowHistory.test.ts
  test:m4-scoped: npx vitest run src/components/review/ConfirmedRecords.test.ts src/components/review/DesignerTaskList.test.ts src/components/review/ResubmissionTaskList.test.ts src/components/review/WorkflowHistory.test.ts
  lint: npm run lint

services:
  frontend:
    start: npm run dev
    stop: lsof -ti :3101 | xargs kill
    healthcheck: curl -sf http://localhost:3101
    port: 3101
    depends_on: []

  backend:
    start: echo "Backend already running on 3100"
    stop: echo "Do not stop backend - shared service"
    healthcheck: curl -sf http://localhost:3100/api/health
    port: 3100
    depends_on: []

# Validation note: for the M4 reviewer workbench mission, run browser validations serially.
# Mission-scoped verification commands for M4 are `commands.typecheck` and `commands.test:m4-scoped`.
# Do not treat whole-repo `npm test` output as an M4 gate; unrelated annotation/parquet failures are out-of-scope baseline noise unless the scoped commands above fail.
# Treat missing reviewer-owned seeded tasks or confirmed-record data as environment blockers, not product passes.

commands:
  install: npm install
  typecheck: npm run type-check
  test: npm test
  lint: npm run lint

services:
  frontend:
    start: npm run dev
    stop: lsof -ti :3101 | xargs kill
    healthcheck: curl -sf http://localhost:3101
    port: 3101
    depends_on: []

  backend:
    start: echo "Backend already running on 3100"
    stop: echo "Do not stop backend - shared service"
    healthcheck: curl -sf http://localhost:3100/api/health
    port: 3100
    depends_on: []

# Validation note: for this follow-up mission, run browser validations serially.
# Current machine headroom is limited (~2.68GB available observed during planning),
# and the executable validation surface is list/detail consistency rather than high-parallel throughput.

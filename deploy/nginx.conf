# Plant3D-Web Nginx 配置
# 部署路径: /etc/nginx/sites-available/plant3d-web
# 启用: sudo ln -s /etc/nginx/sites-available/plant3d-web /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 101.42.162.129;

    # 静态文件根目录
    root /var/www/plant3d-web;

    # 前端应用
    location /plant3d-web/ {
        alias /var/www/plant3d-web/;
        try_files $uri $uri/ /plant3d-web/index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 反向代理 (后端服务)
    location /api {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 文件服务反向代理
    location /files {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 大文件支持
        client_max_body_size 100M;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 1000;
}
